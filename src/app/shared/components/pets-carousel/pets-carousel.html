<section id="mascotas" class="section-padding bg-[var(--background)]">
  <div class="container-custom">
    <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-5">
      <div>
        <span class="font-semibold text-[var(--secondary)] uppercase tracking-wider">
          {{ badge }}
        </span>

        <h2 class="text-4xl font-bold mt-2">
          {{ title }}
        </h2>
      </div>

      <button class="btn-primary-custom mt-4 mt-lg-0">Ver todas</button>
    </div>

    <div class="row g-4">
      <div *ngFor="let pet of pets" class="col-12 col-md-6 col-lg-4">
        <div class="card-pet overflow-hidden">
          <div class="relative">
            <img [src]="pet.image" [alt]="pet.name" class="w-full h-[320px] object-cover" />

            <span
              class="absolute top-4 left-4 px-4 py-2 rounded-full text-sm font-semibold"
              [ngClass]="isLost ? 'bg-red-100 text-red-500' : 'bg-green-100 text-green-600'"
            >
              {{ isLost ? 'Perdido' : 'Encontrado' }}
            </span>
          </div>

          <div class="p-4">
            <div class="flex justify-between items-start">
              <div>
                <h3 class="text-2xl font-bold">
                  {{ pet.name }}
                </h3>

                <p class="text-slate-500">
                  {{ pet.breed }}
                </p>
              </div>

              <i
                class="bi bi-heart text-2xl text-slate-300 cursor-pointer hover:text-red-400 transition"
              >
              </i>
            </div>

            <div class="flex items-center gap-2 mt-3 text-slate-500">
              <i class="bi bi-geo-alt"></i>

              {{ pet.city }}
            </div>

            <button class="w-full mt-4 btn-primary-custom">Ver reporte</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
